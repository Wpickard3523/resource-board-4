<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Resource Board — Valard Distribution</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');
  :root {
    --red:#C8102E; --orange:#F47920; --carbon:#1A1A1A; --dark:#111;
    --panel:#1E1E1E; --panel2:#242424; --border:#2E2E2E; --border2:#3A3A3A;
    --text:#E8E8E8; --muted:#888; --dim:#555; --unassigned-bg:#161616;
    --ab:#e85d04; --sk:#2563eb; --turks:#16a34a; --admin:#7c3aed;
    --hydro:#0284c7; --tc:#b45309; --drill:#4a7a3a;
    --tools:#0f766e; --safety:#dc2626; --mech:#78350f; --status:#7c3aed; --sub:#0369a1; --school:#0891b2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

  /* HEADER */
  header{background:var(--carbon);border-bottom:2px solid var(--red);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo-block{display:flex;align-items:center;gap:11px}
  .logo-mark{width:32px;height:32px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;color:white}
  .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px}
  .logo-text span{color:var(--orange)}
  .header-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .header-actions{display:flex;gap:7px;align-items:center}
  .btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.5px;padding:6px 13px;border:none;cursor:pointer;text-transform:uppercase;transition:all .15s}
  .btn-primary{background:var(--red);color:white}.btn-primary:hover{background:#e01030}
  .btn-secondary{background:transparent;color:var(--orange);border:1px solid var(--orange)}.btn-secondary:hover{background:var(--orange);color:white}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}.btn-ghost:hover{border-color:var(--muted);color:var(--text)}

  /* TAB BAR */
  .tab-bar{background:var(--carbon);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 18px;gap:1px;overflow-x:auto}
  .tab-bar::-webkit-scrollbar{height:0}
  .tab{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text)}
  .tab[data-tab="ab"].active{border-bottom-color:var(--ab)}
  .tab[data-tab="sask"].active{border-bottom-color:var(--sk)}
  .tab[data-tab="turks"].active{border-bottom-color:var(--turks)}
  .tab[data-tab="hydrovac"].active{border-bottom-color:var(--hydro)}
  .tab[data-tab="tc"].active{border-bottom-color:var(--tc)}
  .tab[data-tab="drilling"].active{border-bottom-color:var(--drill)}
  .tab[data-tab="admin"].active{border-bottom-color:var(--admin)}
  .tab[data-tab="tools"].active{border-bottom-color:var(--tools)}
  .tab[data-tab="safety"].active{border-bottom-color:var(--safety)}
  .tab[data-tab="mech"].active{border-bottom-color:var(--mech)}
  .tab[data-tab="status"].active{border-bottom-color:#f59e0b}
  .tab[data-tab="sub"].active{border-bottom-color:var(--sub)}
  .tab[data-tab="school"].active{border-bottom-color:var(--school)}
  .tab-add-btn{background:none;border:1px dashed var(--border2);color:var(--dim);cursor:pointer;padding:6px 12px;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-left:4px;border-radius:2px;white-space:nowrap}
  .tab-add-btn:hover{color:var(--orange);border-color:var(--orange)}
  .tab.active .tab-count{color:white}
  .tab[data-tab="ab"].active .tab-count{background:var(--ab)}
  .tab[data-tab="sask"].active .tab-count{background:var(--sk)}
  .tab[data-tab="turks"].active .tab-count{background:var(--turks)}
  .tab[data-tab="hydrovac"].active .tab-count{background:var(--hydro)}
  .tab[data-tab="tc"].active .tab-count{background:var(--tc)}
  .tab[data-tab="drilling"].active .tab-count{background:var(--drill)}
  .tab[data-tab="admin"].active .tab-count{background:var(--admin)}
  .tab[data-tab="tools"].active .tab-count{background:var(--tools)}
  .tab[data-tab="safety"].active .tab-count{background:var(--safety)}
  .tab[data-tab="mech"].active .tab-count{background:var(--mech)}
  .tab[data-tab="status"].active .tab-count{background:#f59e0b}
  .tab[data-tab="sub"].active .tab-count{background:var(--sub)}
  .tab[data-tab="school"].active .tab-count{background:var(--school)}

  /* STATS+FILTER */
  .stats-filter-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 18px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .stat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--text)}
  .stat-val.orange{color:var(--orange)}.stat-val.red{color:var(--red)}
  .stat-divider{width:1px;height:16px;background:var(--border2)}
  .filter-spacer{flex:1}
  .search-wrap{position:relative}
  .search-wrap input{width:200px;background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:5px 9px 5px 28px;font-family:'Barlow',sans-serif;font-size:12px;outline:none}
  .search-wrap input:focus{border-color:var(--orange)}
  .search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:11px}
  .filter-select{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:5px 9px;font-family:'Barlow',sans-serif;font-size:12px;outline:none;cursor:pointer}
  .filter-select:focus{border-color:var(--orange)}

  /* MAIN */
  .main-wrap{display:flex;height:calc(100vh - 130px)}

  /* UNASSIGNED */
  .unassigned-panel{width:195px;min-width:195px;background:var(--unassigned-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .unassigned-header{padding:9px 11px 7px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .unassigned-count{background:var(--red);color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:'Barlow Condensed',sans-serif}
  .unassigned-list{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:2px}
  .unassigned-list::-webkit-scrollbar{width:3px}
  .unassigned-list::-webkit-scrollbar-thumb{background:var(--border2)}

  /* BOARD */
  .board{flex:1;overflow-x:auto;overflow-y:auto;padding:12px;display:flex;gap:10px;align-items:flex-start}
  .board::-webkit-scrollbar{height:5px;width:5px}
  .board::-webkit-scrollbar-thumb{background:var(--border2)}

  
  .sub-crew-add{padding:4px 8px;text-align:center;font-size:10px;color:var(--dim);cursor:pointer;border-top:1px dashed var(--border2);margin-top:2px}
  .sub-crew-add:hover{color:var(--orange)}
  .sub-crew-header{padding:5px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.03)}
  .sub-crew-drag{cursor:grab;color:var(--border2);font-size:10px;padding:0 2px;user-select:none;flex-shrink:0}
  .sub-crew-drag:hover{color:var(--dim)}
  .sub-crew-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);flex-shrink:0;background:rgba(244,121,32,.12);padding:1px 6px;border-radius:2px;border:1px solid rgba(244,121,32,.25)}
  .sub-crew-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--dim);flex:1;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub-crew-name:hover{color:var(--orange)}
  .sub-crew-name-empty{font-style:italic;color:var(--dim);opacity:.6}
  .sub-crew-name-input{background:transparent;border:none;border-bottom:1px solid var(--orange);color:var(--text);outline:none;width:100%;font-size:10px;font-family:'Barlow Condensed',sans-serif}
  .sub-crew-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;color:var(--dim);flex-shrink:0}
  .sub-crew-count.warn{color:#f59e0b}
  .crew-col{min-width:175px;width:175px;background:var(--panel);border:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .crew-col.drag-over{border-color:var(--orange);background:#1f1a14}
  .crew-col.crew-dragging{opacity:.4;border:1px dashed var(--border2)}
  .crew-col.crew-drop-target{border-color:var(--orange);border-style:dashed;box-shadow:0 0 0 2px var(--orange)}
  .crew-drag-handle{cursor:grab;color:var(--dim);font-size:12px;padding:0 3px;user-select:none;display:flex;align-items:center}
  .crew-drag-handle:hover{color:var(--text)}
  .crew-drag-handle:active{cursor:grabbing}
  .crew-header{padding:8px 9px 6px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
  .crew-name-row{display:flex;align-items:center;justify-content:space-between}
  .crew-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;flex:1}
  .crew-name:hover{color:var(--orange)}
  .crew-name-empty{color:var(--dim);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}
  .crew-name-input{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;background:transparent;border:none;border-bottom:1px solid var(--orange);color:var(--text);outline:none;width:100%}
  .crew-menu-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px}
  .crew-menu-btn:hover{color:var(--text)}
  .crew-meta{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .crew-count-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--orange)}
  .crew-note{font-size:10px;color:var(--muted);background:transparent;border:none;outline:none;width:100%;font-family:'Barlow',sans-serif;resize:none;padding:0;line-height:1.4;cursor:text}
  .crew-note::placeholder{color:var(--dim);font-style:italic}
  .crew-note:focus{color:var(--text)}
  .crew-body{padding:4px;min-height:40px;display:flex;flex-direction:column;gap:2px;flex:1}

  /* WORKER CARD */
  .worker-card{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--border2);padding:0;cursor:grab;user-select:none;transition:border-color .1s,transform .1s;position:relative}
  .worker-card:active{cursor:grabbing;transform:rotate(1deg)}
  .worker-card:hover{border-left-color:var(--orange)}
  .worker-card.dragging{opacity:.4}
  .worker-card-row1{padding:3px 34px 3px 6px;background:rgba(42,122,255,.14);border-bottom:1px solid rgba(42,122,255,.2)}
  .worker-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.3px;line-height:1.3;color:var(--text)}
  .worker-row2{display:flex;align-items:center;justify-content:space-between;padding:2px 6px}
  .worker-job{font-size:9px;font-weight:600;font-family:'Barlow Condensed',sans-serif;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
  .worker-tags{display:flex;gap:2px;flex-shrink:0}
  .worker-tag{font-size:8px;font-weight:600;padding:1px 3px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
  .worker-lic{font-size:10px;color:#60b0ff;font-family:'Barlow Condensed',sans-serif;font-weight:700;padding-left:4px;flex-shrink:0;white-space:nowrap;letter-spacing:.5px}
  .worker-card[data-role="Foreman"]{border-left-color:var(--red)}
  .worker-card[data-role="Journeyman"]{border-left-color:#2a7aff}
  .worker-card[data-role="Apprentice"]{border-left-color:#2d9e4f}
  .worker-card[data-role="Equipment Operator"]{border-left-color:#9b59b6}
  .worker-card[data-role="Groundman"]{border-left-color:var(--dim)}
  .worker-card[data-role="TC Supervisor"]{border-left-color:var(--tc)}
  .worker-card[data-role="Flagger"]{border-left-color:#e0a020}
  .worker-card[data-role="Hydrovac Operator"]{border-left-color:var(--hydro)}
  .worker-card[data-role="Hydrovac Laborer"]{border-left-color:#3a8fc8}
  .worker-card[data-role="Driller"]{border-left-color:var(--drill)}
  .worker-card[data-role="Drill Helper"]{border-left-color:#6aaf5a}
  .worker-card[data-role="Mechanic"]{border-left-color:var(--mech)}
  .worker-card[data-role="Welder"]{border-left-color:#a16207}
  .worker-card[data-role="Safety Professional"]{border-left-color:var(--safety)}
  .worker-card[data-role="Safety Advisor"]{border-left-color:#ef4444}
  .worker-card[data-role="Tools Supervisor"]{border-left-color:var(--tools)}
  .worker-card[data-role="Tools Worker"]{border-left-color:#14b8a6}

  .worker-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.3px;padding-right:36px}
  .worker-job{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--text);background:rgba(255,255,255,.07);border:1px solid var(--border2);padding:1px 5px;margin-top:3px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .worker-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
  .worker-tag{font-size:9px;font-weight:600;padding:1px 4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
  .tag-cert{background:rgba(244,121,32,.13);color:var(--orange);border:1px solid rgba(244,121,32,.25)}
  .tag-license{background:rgba(42,122,255,.1);color:#6aa0ff;border:1px solid rgba(42,122,255,.2)}
  .tag-job{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border2);max-width:155px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-actions{position:absolute;right:3px;top:3px;display:none;gap:2px}
  .worker-card:hover .card-actions{display:flex}
  .admin-card:hover .card-actions{display:flex}
  .card-act-btn{background:var(--border);border:none;color:var(--muted);width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .card-act-btn:hover{background:var(--border2);color:var(--text)}

  /* SCHOOL CARD */
  .school-card{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--school);padding:7px 9px;position:relative;user-select:none;cursor:grab}
  .school-card:active{cursor:grabbing}
  .school-card:hover{border-left-color:var(--orange)}
  .school-card.dragging{opacity:.4}
  .school-card[data-level="1st Year"]{border-left-color:#0369a1}
  .school-card[data-level="2nd Year"]{border-left-color:#0284c7}
  .school-card[data-level="3rd Year"]{border-left-color:#0ea5e9}
  .school-card[data-level="4th Year"]{border-left-color:#38bdf8}
  .school-card[data-level="HET"]{border-left-color:#7c3aed}
  .school-card[data-level="NAIT"]{border-left-color:#7c3aed}
  .school-card[data-level="SIAST"]{border-left-color:#9333ea}
  .school-card[data-level="Journeyman Upgrade"]{border-left-color:#16a34a}
  .school-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;padding-right:42px}
  .school-level{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
  .school-meta{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
  .school-tag{font-size:9px;font-weight:600;padding:1px 4px;font-family:'Barlow Condensed',sans-serif}
  .school-tag-inst{background:rgba(8,145,178,.12);color:#22d3ee;border:1px solid rgba(8,145,178,.25)}
  .school-tag-date{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border2)}
  .add-crew-col{min-width:140px;width:140px;border:1px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:16px;color:var(--dim);flex-shrink:0;transition:border-color .15s,color .15s;min-height:100px}
  .add-crew-col:hover{border-color:var(--orange);color:var(--orange)}
  .add-crew-icon{font-size:22px}
  .add-crew-label{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase}

  /* ADMIN CARD (wider, different layout) */
  .admin-card{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--admin);padding:8px 10px;position:relative;user-select:none}
  .admin-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
  .admin-title{font-size:10px;color:var(--muted);margin-top:2px}
  .admin-supv{font-size:9px;color:var(--dim);margin-top:2px}
  .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:10px}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--panel);border:1px solid var(--border2);border-top:3px solid var(--orange);width:420px;max-width:95vw;padding:20px;max-height:90vh;overflow-y:auto}
  .modal h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px;margin-bottom:14px;text-transform:uppercase}
  .form-row{margin-bottom:11px}
  .form-row label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .form-row input,.form-row select{width:100%;background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:7px 9px;font-family:'Barlow',sans-serif;font-size:13px;outline:none}
  .form-row input:focus,.form-row select:focus{border-color:var(--orange)}
  .form-row select option{background:var(--carbon)}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
  .modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:16px}

  /* CTX MENU */
  .ctx-menu{position:fixed;background:var(--carbon);border:1px solid var(--border2);z-index:300;min-width:155px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .ctx-menu.open{display:block}
  .ctx-item{padding:8px 13px;font-size:12px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:7px}
  .ctx-item:hover{background:var(--panel2)}
  .ctx-item.danger{color:var(--red)}
  .ctx-divider{height:1px;background:var(--border);margin:3px 0}

  /* MOVE TIP */
  .move-tooltip{position:fixed;background:var(--carbon);border:1px solid var(--orange);padding:9px 11px;z-index:400;font-size:11px;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;max-height:260px;overflow-y:auto}
  .move-tooltip.open{display:block}
  .move-tooltip::-webkit-scrollbar{width:3px}
  .move-tooltip::-webkit-scrollbar-thumb{background:var(--border2)}
  .move-tooltip-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--orange);margin-bottom:6px;text-transform:uppercase}
  .move-crew-option{padding:5px 0;font-size:11px;cursor:pointer;color:var(--muted);border-bottom:1px solid var(--border);transition:color .1s}
  .move-crew-option:last-child{border-bottom:none}
  .move-crew-option:hover{color:var(--text)}
  .move-crew-option.unassign{color:var(--red)}

  /* LEGEND */
  .legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim)}
  .legend-pip{width:3px;height:11px;border-radius:1px}
</style>
</head>
<body>

<!-- PIN GATE -->
<div id="pinGate" style="position:fixed;inset:0;background:#0d0d0d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0">
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:32px;letter-spacing:3px;color:#fff;text-transform:uppercase;margin-bottom:4px">VALARD <span style="color:#C8102E">DISTRIBUTION</span></div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:36px">Resource Board</div>

// ─── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const gridTabs   = ['admin','tools','safety','mech'];
  const isGrid     = gridTabs.includes(tab) || TAB_CONFIG[tab]?.layout === 'grid';
  const noUnassign = [...gridTabs].includes(tab);
  const isSchool   = tab === 'school';
  document.getElementById('addCrewBtn').style.display   = isGrid ? 'none' : '';
  document.getElementById('addCrewBtn').textContent     = isSchool ? '+ Session' : '+ Crew';
  document.getElementById('addWorkerBtn').style.display = 'inline-block';
  document.getElementById('addWorkerBtn').textContent   = isSchool ? '+ Student' : '+ Worker';
  document.getElementById('unassigned-side').style.display = noUnassign ? 'none' : '';
  updateRoleFilter();
  updateLegend();
  renderActive();
}
function updateRoleFilter() {
  const sel = document.getElementById('roleFilter');
  sel.innerHTML = '<option value="">All Roles</option>';
  TAB_CONFIG[activeTab].roles.forEach(r => {
    const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o);
  });
}
function updateLegend() {
  const bar = document.getElementById('legend-bar');
  bar.innerHTML = TAB_CONFIG[activeTab].legend.map(l =>
    `<div class="legend-item"><div class="legend-pip" style="background:${l.c}"></div>${l.r}</div>`
  ).join('');
}

// ─── ROLE SORT ─────────────────────────────────────────────────────────────
const ROLE_ORDER = {
  'Foreman':0,'TC Supervisor':0,'Driller':0,'Hydrovac Operator':0,
  'Journeyman':1,'Equipment Operator':2,'Apprentice':3,
  'Groundman':4,'Hydrovac Laborer':4,'Drill Helper':4,'Flagger':4,
  'Tools Worker':5,'Tools Supervisor':5,'Mechanic':5,'Welder':5,'Shop Lead':5,
};
function roleRank(r) { return ROLE_ORDER[r] !== undefined ? ROLE_ORDER[r] : 99; }
function sortByRole(arr) {
  return [...arr].sort((a,b) => {
    const rd = roleRank(a.role) - roleRank(b.role);
    if (rd) return rd;
    const ca = parseInt(a.cert)||0, cb = parseInt(b.cert)||0;
    if (ca !== cb) return cb - ca;
    return a.name.localeCompare(b.name);
  });
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderActive() {
  if (['admin','tools','safety','mech'].includes(activeTab)) { renderGrid(); return; }
  if (TAB_CONFIG[activeTab]?.layout === 'grid') { renderGrid(); return; }
  if (activeTab === 'school') { renderSchool(); return; }

  const board  = document.getElementById('board');
  const pool   = document.getElementById('unassigned-pool');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const roleF  = document.getElementById('roleFilter').value;
  board.innerHTML = ''; pool.innerHTML = '';

  const filterOk = w =>
    (!search || w.name.toLowerCase().includes(search) || (w.jobTitle||'').toLowerCase().includes(search)) &&
    (!roleF || w.role === roleF);

  // Flat tabs (status, sub, or custom flat layout)
  const flatTabs = ['status','sub'];
  if (flatTabs.includes(activeTab) || TAB_CONFIG[activeTab]?.layout === 'flat') {
    state.crews.filter(c => c.tab === activeTab).forEach(c => board.appendChild(buildFlatCol(c, filterOk)));
    const btn = document.createElement('div');
    btn.className = 'add-crew-col';
    btn.innerHTML = '<div class="add-crew-icon">＋</div><div class="add-crew-label">Add Crew</div>';
    btn.onclick = openAddCrew;
    board.appendChild(btn);
    sortByRole(state.workers.filter(w => w.tab === activeTab && !w.crewId && filterOk(w)))
      .forEach(w => pool.appendChild(makeCard(w)));
    updateStats();
    return;
  }

  // Supervisor layout — sup columns with nested sub-crew blocks
  const sups = state.crews.filter(c => c.tab === activeTab && c.type === 'sup');

  sups.forEach(sup => {
    const subs   = state.crews.filter(c => c.supId === sup.id);
    const allIds = new Set([sup.id, ...subs.map(c => c.id)]);
    const totalW = state.workers.filter(w => w.tab === activeTab && allIds.has(w.crewId)).length;

    const col = document.createElement('div');
    col.className = 'crew-col';
    col.style.cssText = 'width:230px;min-width:230px;flex-shrink:0';

    // Drag to reorder — only from ⠿ handle
    col.addEventListener('mousedown', e => {
      if (e.target.closest('.sub-crew-drag')) return; // let sub-crew handle its own drag
      col.draggable = !!e.target.closest('.crew-drag-handle');
    });
    col.addEventListener('dragstart', e => {
      if (e.target.closest('.sub-crew-drag')) return; // sub-crew drag — don't intercept
      if (!col.draggable) { e.preventDefault(); return; }
      dragCrewId = sup.id; dragWorkerId = null;
      col.classList.add('crew-dragging'); e.dataTransfer.effectAllowed = 'move';
    });
    col.addEventListener('dragend', e => {
      if (dragSubCrewId) return; // sub-crew drag in progress — don't touch col state
      col.draggable = false; col.classList.remove('crew-dragging'); dragCrewId = null;
      document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
    });
    col.addEventListener('dragover', e => {
      if (dragCrewId && dragCrewId !== sup.id) { e.preventDefault(); col.classList.add('crew-drop-target'); }
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
      if (!dragCrewId || dragCrewId === sup.id) return;
      const tabSups = state.crews.filter(c => c.tab === activeTab && c.type === 'sup');
      const fi = tabSups.findIndex(c => c.id === dragCrewId);
      const ti = tabSups.findIndex(c => c.id === sup.id);
      if (fi !== -1 && ti !== -1) {
        const [mv] = tabSups.splice(fi, 1);
        tabSups.splice(ti, 0, mv);
        const rebuilt = [];
        tabSups.forEach(s => {
          rebuilt.push(s);
          state.crews.filter(c => c.supId === s.id).forEach(c => rebuilt.push(c));
        });
        state.crews = [...state.crews.filter(c => c.tab !== activeTab), ...rebuilt];
      }
      dragCrewId = null; renderActive();
    });

    // Supervisor header
    const nameClass = 'crew-name' + (sup.name ? '' : ' crew-name-empty');
    const hdr = document.createElement('div');
    hdr.className = 'crew-header';
    hdr.style.borderTop = '2px solid var(--red)';
    hdr.innerHTML =
      '<div class="crew-name-row">' +
        '<span class="crew-drag-handle">⠿</span>' +
        '<div class="' + nameClass + '" onclick="startRename(\'' + sup.id + '\')" id="cname-' + sup.id + '">' + (sup.name||'Click to name…') + '</div>' +
        '<button class="crew-menu-btn" onclick="openCtx(event,\'' + sup.id + '\')">⋯</button>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:4px;margin-top:3px">' +
        '<textarea class="crew-note" rows="1" placeholder="Notes…" style="flex:1;min-width:0" onchange="saveCrewNote(\'' + sup.id + '\',this.value)" oninput="autoResizeNote(this)">' + (sup.note||'') + '</textarea>' +
        '<span class="crew-count-badge" style="white-space:nowrap">' + subs.length + 'c / ' + totalW + 'w</span>' +
      '</div>';
    col.appendChild(hdr);

    // Sub-crews list
    const subList = document.createElement('div');
    subList.style.cssText = 'display:flex;flex-direction:column;gap:5px;padding:6px;overflow-y:auto;scrollbar-width:thin';
    // Accept sub-crew drops into this supervisor
    subList.addEventListener('dragover', e => {
      if (dragSubCrewId) { e.preventDefault(); e.stopPropagation(); }
    });
    subList.addEventListener('drop', e => {
      if (!dragSubCrewId) return;
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('[data-sub-id]').forEach(b => b.style.outline = '');
      // Drop on empty space in this sup's subList — append to end
      moveSubCrewTo(dragSubCrewId, sup.id, null);
    });

    subs.forEach((sub, idx) => {
      const members = sortByRole(state.workers.filter(w => w.crewId === sub.id && w.tab === activeTab));
      const over    = members.length > 6;

      const block = document.createElement('div');
      const accentColors = ['#2a7aff','#2d9e4f','#9b59b6','#0891b2','#d97706','#dc2626','#0d9488','#7c3aed'];
      const accent = accentColors[idx % accentColors.length];
      block.style.cssText = 'background:var(--panel2);border:1px solid ' + (over ? '#f59e0b' : 'var(--border2)') + ';border-radius:2px;border-left:3px solid ' + (over ? '#f59e0b' : accent);
      block.dataset.subId = sub.id;

      // Sub-crew reorder — only from ⠿ handle
      block.addEventListener('mousedown', e => {
        block.draggable = !!e.target.closest('.sub-crew-drag');
      });
      block.addEventListener('dragstart', e => {
        if (!block.draggable) { e.preventDefault(); return; }
        e.stopPropagation(); // don't bubble to col
        dragSubCrewId = sub.id; dragWorkerId = null; dragCrewId = null;
        block.style.opacity = '0.4';
        e.dataTransfer.effectAllowed = 'move';
      });
      block.addEventListener('dragend', () => {
        block.draggable = false;
        block.style.opacity = '1';
        dragSubCrewId = null;
        subList.querySelectorAll('[data-sub-id]').forEach(b => b.style.outline = '');
      });

      block.addEventListener('dragover', e => {
        if (dragSubCrewId && dragSubCrewId !== sub.id) {
          e.preventDefault(); e.stopPropagation();
          document.querySelectorAll('[data-sub-id]').forEach(b => b.style.outline = '');
          block.style.outline = '2px dashed var(--orange)';
        } else if (!dragSubCrewId && dragCrewId === null) {
          e.preventDefault(); e.stopPropagation();
          block.style.borderColor = 'var(--orange)';
        }
      });
      block.addEventListener('dragleave', e => {
        if (!block.contains(e.relatedTarget)) {
          block.style.borderColor = over ? '#f59e0b' : 'var(--border2)';
          block.style.outline = '';
        }
      });
      block.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        block.style.borderColor = over ? '#f59e0b' : 'var(--border2)';
        block.style.outline = '';

        if (dragSubCrewId && dragSubCrewId !== sub.id) {
          moveSubCrewTo(dragSubCrewId, sup.id, sub.id);
        } else if (!dragSubCrewId && dragWorkerId) {
          const w = state.workers.find(x => x.id === dragWorkerId);
          if (w) { w.crewId = sub.id; w.tab = activeTab; }
          dragWorkerId = null;
          renderActive();
        }
      });

      const cName = sub.name ? sub.name : 'name…';
      const cCls  = 'sub-crew-name' + (sub.name ? '' : ' sub-crew-name-empty');
      const numStyle = over
        ? 'background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)'
        : 'background:' + accent + '22;color:' + accent + ';border:1px solid ' + accent + '55';
      block.innerHTML =
        '<div class="sub-crew-header">' +
          '<span class="sub-crew-drag" title="Drag to reorder">⠿</span>' +
          '<span class="sub-crew-num" style="' + numStyle + '">Crew ' + (idx+1) + '</span>' +
          '<div class="' + cCls + '" onclick="startSubRename(\'' + sub.id + '\')" id="scname-' + sub.id + '">' + cName + '</div>' +
          '<span class="sub-crew-count' + (over?' warn':'') + '">' + members.length + '/6</span>' +
          '<button class="crew-menu-btn" style="font-size:10px;opacity:.6" title="Move to supervisor" onclick="openSubCrewMoveTip(event,\'' + sub.id + '\')">↔</button>' +
          '<button class="crew-menu-btn" style="font-size:10px;opacity:.45" onclick="removeSubCrew(\'' + sub.id + '\')">✕</button>' +
        '</div>' +
        '<div style="padding:4px 6px;display:flex;flex-direction:column;gap:3px;min-height:30px" id="sb-' + sub.id + '"></div>';
      subList.appendChild(block);

      const body = block.querySelector('[id="sb-' + sub.id + '"]');
      if (body) members.filter(filterOk).forEach(w => body.appendChild(makeCard(w)));
    });

    // + Add Crew
    if (subs.length < 8) {
      const addBtn = document.createElement('div');
      addBtn.className = 'sub-crew-add';
      addBtn.textContent = '+ Add Crew';
      addBtn.onclick = () => addSubCrew(sup.id);
      subList.appendChild(addBtn);
    }

    col.appendChild(subList);
    board.appendChild(col);
  });

  // + Add Supervisor
  const addSup = document.createElement('div');
  addSup.className = 'add-crew-col';
  addSup.innerHTML = '<div class="add-crew-icon">＋</div><div class="add-crew-label">Add Supervisor</div>';
  addSup.onclick = addSupervisor;
  board.appendChild(addSup);

  // Unassigned pool — active tab only
  sortByRole(state.workers.filter(w => w.tab === activeTab && !w.crewId && filterOk(w)))
    .forEach(w => pool.appendChild(makeCard(w)));
  updateStats();
}

// ─── FLAT COL (status / sub tabs) ──────────────────────────────────────────
function buildFlatCol(crew, filterOk) {
  const col = document.createElement('div');
  col.className = 'crew-col'; col.dataset.crewId = crew.id;
  col.addEventListener('mousedown', e => { col.draggable = !!e.target.closest('.crew-drag-handle'); });
  col.addEventListener('dragstart', e => {
    if (!col.draggable) { e.preventDefault(); return; }
    dragCrewId = crew.id; dragWorkerId = null;
    col.classList.add('crew-dragging'); e.dataTransfer.effectAllowed = 'move';
  });
  col.addEventListener('dragend', () => {
    col.draggable = false; col.classList.remove('crew-dragging'); dragCrewId = null;
    document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
  });
  col.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragCrewId && dragCrewId !== crew.id) {
      document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
      col.classList.add('crew-drop-target');
    } else if (!dragCrewId) onDragOver(e, crew.id);
  });
  col.addEventListener('drop', e => {
    e.preventDefault();
    document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target','drag-over'));
    if (dragCrewId && dragCrewId !== crew.id) {
      const tc = state.crews.filter(c => c.tab === activeTab);
      const oc = state.crews.filter(c => c.tab !== activeTab);
      const fi = tc.findIndex(c => c.id === dragCrewId);
      const ti = tc.findIndex(c => c.id === crew.id);
      if (fi !== -1 && ti !== -1) { const [m] = tc.splice(fi,1); tc.splice(ti,0,m); state.crews=[...oc,...tc]; }
      dragCrewId = null; renderActive();
    } else if (!dragCrewId) onDrop(e, crew.id);
  });
  col.addEventListener('dragleave', e => { if (!dragCrewId) onDragLeave(); else col.classList.remove('crew-drop-target'); });

  const rm = state.workers.filter(w => w.crewId === crew.id && w.tab === activeTab);
  let accent = '';
  if (crew.id==='ld1') accent='border-top:3px solid #f59e0b;';
  else if (crew.id==='ld2') accent='border-top:3px solid #dc2626;';
  else if (crew.id==='ont1'||crew.id==='ont2') accent='border-top:3px solid #ea580c;';

  col.innerHTML =
    '<div class="crew-header" style="' + accent + '">' +
      '<div class="crew-name-row">' +
        '<span class="crew-drag-handle">⠿</span>' +
        '<div class="crew-name' + (crew.name?'':' crew-name-empty') + '" onclick="startRename(\'' + crew.id + '\')" id="cname-' + crew.id + '">' + (crew.name||'Click to name…') + '</div>' +
        '<button class="crew-menu-btn" onclick="openCtx(event,\'' + crew.id + '\')">⋯</button>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:4px;margin-top:2px">' +
        '<textarea class="crew-note" rows="1" placeholder="Notes…" onchange="saveCrewNote(\'' + crew.id + '\',this.value)" oninput="autoResizeNote(this)">' + (crew.note||'') + '</textarea>' +
        '<span class="crew-count-badge">' + rm.length + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="crew-body" id="crew-body-' + crew.id + '"></div>';

  sortByRole(rm).filter(filterOk).forEach(w => {
    const b = col.querySelector('#crew-body-' + crew.id);
    if (b) b.appendChild(makeCard(w));
  });
  return col;
}

// ─── SUB-CREW MOVE HELPER ─────────────────────────────────────────────────
// Move sub-crew to a new supervisor (and optionally before a target sub-crew)
// If newSupId === null, just change tab. If targetSubId === null, append to end of newSupId.
function moveSubCrewTo(subId, newSupId, targetSubId) {
  const sub = state.crews.find(c => c.id === subId);
  if (!sub) { dragSubCrewId = null; return; }

  const oldSupId = sub.supId;
  const newSup   = state.crews.find(c => c.id === newSupId);

  // Update the sub-crew's supId and tab
  sub.supId = newSupId;
  if (newSup) sub.tab = newSup.tab;

  // Update workers in this crew to match new tab
  state.workers.forEach(w => { if (w.crewId === subId) w.tab = sub.tab; });

  // Remove sub from current position
  state.crews = state.crews.filter(c => c.id !== subId);

  // Insert at new position
  if (targetSubId) {
    const ti = state.crews.findIndex(c => c.id === targetSubId);
    if (ti !== -1) { state.crews.splice(ti, 0, sub); }
    else { state.crews.push(sub); }
  } else {
    // Append after last sub of newSupId
    let lastIdx = state.crews.findIndex(c => c.id === newSupId);
    for (let i = lastIdx + 1; i < state.crews.length && state.crews[i].supId === newSupId; i++) lastIdx = i;
    state.crews.splice(lastIdx + 1, 0, sub);
  }

  dragSubCrewId = null;
  renderActive();
}

// Open a tooltip to move a sub-crew to a different supervisor or tab
function openSubCrewMoveTip(e, subId) {
  e.stopPropagation();
  const tip  = document.getElementById('moveTip');
  const list = document.getElementById('moveTipList');
  list.innerHTML = '';
  const sub = state.crews.find(c => c.id === subId);
  if (!sub) return;

  // Group supervisors by tab
  const sups = state.crews.filter(c => c.type === 'sup');
  const tabGroups = {};
  sups.forEach(s => {
    if (!tabGroups[s.tab]) tabGroups[s.tab] = [];
    tabGroups[s.tab].push(s);
  });

  Object.keys(tabGroups).forEach(tab => {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:9px;color:var(--muted);font-family:"Barlow Condensed",sans-serif;letter-spacing:1px;text-transform:uppercase;padding:5px 8px 2px;border-top:1px solid var(--border)';
    hdr.textContent = (TAB_CONFIG[tab]||{label:tab}).label;
    list.appendChild(hdr);

    tabGroups[tab].forEach(s => {
      if (s.id === sub.supId) return; // already here
      const d = document.createElement('div');
      d.className = 'move-crew-option';
      d.textContent = '→ ' + (s.name || 'Unnamed Supervisor');
      d.onclick = () => { closeTip(); moveSubCrewTo(subId, s.id, null); };
      list.appendChild(d);
    });
  });

  tip.style.left = Math.min(e.clientX+10, window.innerWidth-200)+'px';
  tip.style.top  = Math.min(e.clientY-10, window.innerHeight-320)+'px';
  tip.classList.add('open');
}
function addSubCrew(supId) {
  const id = 'sc'+Date.now();
  let insertAt = state.crews.findIndex(c => c.id === supId) + 1;
  state.crews.filter(c => c.supId === supId).forEach(() => insertAt++);
  // Actually compute correctly
  const supIdx = state.crews.findIndex(c => c.id === supId);
  let last = supIdx;
  for (let i = supIdx+1; i < state.crews.length && state.crews[i].supId === supId; i++) last = i;
  state.crews.splice(last+1, 0, {id, name:'', tab:activeTab, note:'', type:'sub', supId});
  renderActive();
}
function addSupervisor() {
  const id = 'sup'+Date.now();
  let insertAt = state.crews.length;
  for (let i = state.crews.length-1; i >= 0; i--) {
    if (state.crews[i].tab === activeTab) { insertAt = i+1; break; }
  }
  state.crews.splice(insertAt, 0,
    {id,       name:'', tab:activeTab, note:'', type:'sup'},
    {id:id+'_1',name:'', tab:activeTab, note:'', type:'sub', supId:id},
    {id:id+'_2',name:'', tab:activeTab, note:'', type:'sub', supId:id},
    {id:id+'_3',name:'', tab:activeTab, note:'', type:'sub', supId:id}
  );
  renderActive();
}
function removeSubCrew(subId) {
  if (!confirm('Remove crew? Workers will be unassigned.')) return;
  state.workers.forEach(w => { if (w.crewId === subId) w.crewId = null; });
  state.crews = state.crews.filter(c => c.id !== subId);
  renderActive();
}
function startSubRename(subId) {
  const c = state.crews.find(x => x.id === subId); if (!c) return;
  const el = document.getElementById('scname-'+subId); if (!el) return;
  el.outerHTML = '<input class="sub-crew-name-input" id="scname-input-' + subId + '" value="' + c.name + '" placeholder="Crew name…" onblur="finishSubRename(\'' + subId + '\')" onkeydown="if(event.key===\'Enter\')this.blur()">';
  setTimeout(() => { const i=document.getElementById('scname-input-'+subId); if(i){i.focus();i.select();} }, 10);
}
function finishSubRename(subId) {
  const inp = document.getElementById('scname-input-'+subId); if (!inp) return;
  const c = state.crews.find(x => x.id === subId); if (c) c.name = inp.value.trim();
  renderActive();
}

// ─── GRID (admin/tools/safety/mech) ────────────────────────────────────────
function renderGrid() {
  const board = document.getElementById('board');
  const search = document.getElementById('searchInput').value.toLowerCase();
  board.innerHTML = '';
  const accentMap = {admin:'var(--admin)',tools:'var(--tools)',safety:'var(--safety)',mech:'var(--mech)'};
  const accent = accentMap[activeTab] || 'var(--admin)';
  const accentHex = {admin:'#7c3aed',tools:'#0f766e',safety:'#dc2626',mech:'#78350f'}[activeTab] || '#7c3aed';
  const workers = state.workers.filter(w => w.tab === activeTab &&
    (!search || w.name.toLowerCase().includes(search) || (w.jobTitle||'').toLowerCase().includes(search)));
  const grid = document.createElement('div');
  grid.className = 'admin-grid'; grid.style.width = '100%';
  workers.sort((a,b) => a.name.localeCompare(b.name)).forEach(w => {
    const d = document.createElement('div');
    d.className = 'admin-card';
    d.style.borderLeftColor = accent;
    d.dataset.workerId = w.id;

    // Helper: make a field inline-editable on click
    function makeEditable(el, field, placeholder) {
      el.title = 'Click to edit';
      el.style.cursor = 'text';
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        if (el.querySelector('input')) return;
        const cur = w[field] || '';
        const inp = document.createElement('input');
        inp.value = cur;
        inp.placeholder = placeholder || '';
        inp.style.cssText = 'background:transparent;border:none;border-bottom:1px solid ' + accentHex + ';color:inherit;font:inherit;width:100%;outline:none;padding:0';
        el.innerHTML = '';
        el.appendChild(inp);
        inp.focus(); inp.select();
        function commit() {
          const val = inp.value.trim();
          w[field] = val;
          renderGrid();
        }
        inp.addEventListener('blur', commit);

    jobEl.textContent = lastJobVal || 'click to add project…';
    d.appendChild(jobEl);

    grid.appendChild(d);

    makeEditable(nameEl,   'name',     'Last, First');
    makeEditable(titleEl,  'jobTitle', 'Job Title');
    makeEditable(certEl,   'cert',     'Cert / Ticket');

function makeCard(w) {

  div.className = 'worker-card'; div.dataset.workerId = w.id; div.dataset.role = w.role; div.draggable = true;
  // Only show cert if it's a meaningful credential, not a plain role label
  const roleLabels = new Set(['Foreman','Foreperson','Supervisor','Journeyman','Labourer','Laborer',
    'Equipment Operator','Hydrovac Operator','Hydrovac Swamper','Swamper','Driller','Traffic Control Person',
    'Project Coordinator','Project Manager','Safety Advisor','Safety Professional','Mechanic',
    'Welder','Jr Operations Administrator','Part Technician','Superintendent','TCS','TCP']);
  const certTag = (w.cert && !roleLabels.has(w.cert))
    ? '<span class="worker-tag tag-cert">' + w.cert + '</span>' : '';
  const licTag = w.license ? '<span class="worker-tag tag-license">' + w.license + '</span>' : '';
  div.innerHTML =
    '<div class="card-actions">' +
      '<button class="card-act-btn" title="Move" onclick="openMoveTip(event,\'' + w.id + '\')">↔</button>' +
      '<button class="card-act-btn" title="Edit" onclick="openEditWorker(\'' + w.id + '\')">✏</button>' +
      '<button class="card-act-btn" title="Remove" onclick="removeWorker(\'' + w.id + '\')">✕</button>' +
    '</div>' +

    '<div class="worker-row2">' +
      (w.jobTitle ? '<span class="worker-job">' + w.jobTitle + '</span>' : '') +
      '<span style="display:flex;align-items:center;gap:3px;margin-left:auto">' +
        certTag +
        (w.license ? '<span class="worker-lic">' + w.license + '</span>' : '') +
      '</span>' +
    '</div>';
  div.addEventListener('dragstart', e => { e.stopPropagation(); dragCrewId = null; dragSubCrewId = null; dragWorkerId = w.id; div.classList.add('dragging'); });
  div.addEventListener('dragend',   () => { dragWorkerId = null; div.classList.remove('dragging'); });
  return div;
}

// ─── STATS ─────────────────────────────────────────────────────────────────
function updateStats() {
  const tab = activeTab;
  const gridTabs = ['admin','tools','safety','mech'];
  const isGrid   = gridTabs.includes(tab);
  const isSchool = tab === 'school';
  const hasSup   = state.crews.some(c => c.tab === tab && c.type === 'sup');
  const crews    = hasSup ? state.crews.filter(c => c.tab === tab && c.type === 'sup')
                          : state.crews.filter(c => c.tab === tab);
  const workers  = isSchool ? (state.students||[]) : state.workers.filter(w => w.tab === tab);
  const unassigned = (isGrid||isSchool) ? 0 : workers.filter(w => !w.crewId).length;
  document.getElementById('stat-crews').textContent     = isGrid ? '—' : crews.length;
  document.getElementById('stat-workers').textContent   = workers.length;
  document.getElementById('stat-unassigned').textContent = unassigned;
  document.getElementById('unassigned-badge').textContent = unassigned;
  Object.keys(TAB_CONFIG).forEach(t => {
    const el = document.getElementById('tc-'+t); if (!el) return;
    el.textContent = t === 'school' ? (state.students||[]).length : state.workers.filter(w => w.tab === t).length;
  });
}

// ─── DRAG & DROP ───────────────────────────────────────────────────────────
function onDragOver(e, crewId) {
  e.preventDefault();
  const col = crewId === '__unassigned' ? document.getElementById('unassigned-pool')
            : document.querySelector('[data-crew-id="' + crewId + '"]');
  if (col) col.classList.add('drag-over');
}
function onDragLeave() { document.querySelectorAll('.crew-col,#unassigned-pool').forEach(el => el.classList.remove('drag-over')); }
function onDrop(e, crewId) {
  e.preventDefault(); onDragLeave();
  if (!dragWorkerId) return;
  const w = state.workers.find(x => x.id === dragWorkerId);
  if (w) w.crewId = crewId === '__unassigned' ? null : crewId;

}

// ─── MOVE TOOLTIP ──────────────────────────────────────────────────────────
function openMoveTip(e, workerId) {
  e.stopPropagation();
  const tip = document.getElementById('moveTip'), list = document.getElementById('moveTipList');
  list.innerHTML = '';
  const w = state.workers.find(x => x.id === workerId);
  if (!w) return;

  // ── Move to crew within current tab ────────────────────────────────────
  const destinations = state.crews.filter(c => {
    if (c.tab !== w.tab) return false;
    if (c.type === 'sup') return false;
    return true;
  });
  if (destinations.length) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:9px;color:var(--muted);font-family:"Barlow Condensed",sans-serif;letter-spacing:1px;text-transform:uppercase;padding:4px 8px 2px;border-bottom:1px solid var(--border)';
    hdr.textContent = 'Move to Crew';
    list.appendChild(hdr);
    destinations.forEach(c => {
      const sup = c.supId ? state.crews.find(s => s.id === c.supId) : null;
      const d = document.createElement('div'); d.className = 'move-crew-option';
      d.textContent = sup ? (sup.name||'Supervisor') + ' › ' + (c.name||'Crew') : (c.name||'Crew');
      d.onclick = () => { const ww=state.workers.find(x=>x.id===workerId); if(ww) { ww.crewId=c.id; ww.tab=c.tab; } closeTip(); renderActive(); };
      list.appendChild(d);
    });
  }

  // ── Unassign ───────────────────────────────────────────────────────────
  if (w.crewId) {
    const u = document.createElement('div'); u.className = 'move-crew-option unassign';
    u.textContent = '⬅ Unassign';
    u.onclick = () => { const ww=state.workers.find(x=>x.id===workerId); if(ww) ww.crewId=null; closeTip(); renderActive(); };
    list.appendChild(u);
  }

  // ── Move to different tab ──────────────────────────────────────────────
  const tabHdr2 = document.createElement('div');
  tabHdr2.style.cssText = 'font-size:9px;color:var(--muted);font-family:"Barlow Condensed",sans-serif;letter-spacing:1px;text-transform:uppercase;padding:6px 8px 2px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)';
  tabHdr2.textContent = 'Move to Tab';
  list.appendChild(tabHdr2);
  Object.keys(TAB_CONFIG).filter(t => t !== w.tab).forEach(t => {
    const d = document.createElement('div'); d.className = 'move-crew-option';
    d.textContent = '\u2192 ' + (TAB_CONFIG[t]||{label:t}).label;
    d.onclick = () => {
      const ww = state.workers.find(x => x.id === workerId);
      if (ww) { ww.tab = t; ww.crewId = null; }
      closeTip(); switchTab(t);
    };
    list.appendChild(d);
  });

  tip.style.left = Math.min(e.clientX+10, window.innerWidth-200)+'px';
  tip.style.top  = Math.min(e.clientY-10, window.innerHeight-300)+'px';
  tip.classList.add('open');
}
function closeTip() { document.getElementById('moveTip').classList.remove('open'); }

// ─── ADMIN MOVE TOOLTIP ────────────────────────────────────────────────────
function openAdminMoveTip(e, workerId) {
  e.stopPropagation();
  const tip  = document.getElementById('moveTip');
  const list = document.getElementById('moveTipList');
  list.innerHTML = '';
  const w = state.workers.find(x => x.id === workerId);

  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:12px;color:var(--orange);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px';
  hdr.textContent = 'Move ' + w.name.split(',')[0] + ' to…';
  list.appendChild(hdr);

  Object.keys(TAB_CONFIG).filter(t => t !== w.tab).forEach(t => {
    const d = document.createElement('div');
    d.className = 'move-crew-option';
    d.textContent = '\u2192 ' + TAB_CONFIG[t].label;
    d.onclick = (ev) => {
      ev.stopPropagation();
      const ww = state.workers.find(x => x.id === workerId);

// ─── SCHOOL ────────────────────────────────────────────────────────────────
function renderSchool() {
  const board  = document.getElementById('board');
  const search = document.getElementById('searchInput').value.toLowerCase();
  board.innerHTML = '';
  const sessions = state.crews.filter(c => c.tab === 'school');
  sessions.forEach(session => {
    const col = document.createElement('div');
    col.className = 'crew-col'; col.dataset.crewId = session.id;
    col.addEventListener('mousedown', e => { col.draggable = !!e.target.closest('.crew-drag-handle'); });
    col.addEventListener('dragstart', e => {
      if (!col.draggable) { e.preventDefault(); return; }
      dragCrewId = session.id; dragWorkerId = null;
      col.classList.add('crew-dragging'); e.dataTransfer.effectAllowed = 'move';
    });
    col.addEventListener('dragend', () => {
      col.draggable = false; col.classList.remove('crew-dragging'); dragCrewId = null;
      document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
    });
    col.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragCrewId && dragCrewId !== session.id) {
        document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
        col.classList.add('crew-drop-target');
      }
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.crew-col').forEach(c => c.classList.remove('crew-drop-target'));
      if (!dragCrewId || dragCrewId === session.id) return;
      const sc = state.crews.filter(c => c.tab === 'school');
      const oc = state.crews.filter(c => c.tab !== 'school');
      const fi = sc.findIndex(c => c.id === dragCrewId);
      const ti = sc.findIndex(c => c.id === session.id);
      if (fi !== -1 && ti !== -1) { const [m]=sc.splice(fi,1); sc.splice(ti,0,m); state.crews=[...oc,...sc]; }
      dragCrewId = null; renderSchool();
    });

    const members = (state.students||[]).filter(s => s.sessionId === session.id && (!search || s.name.toLowerCase().includes(search)));
    col.innerHTML =
      '<div class="crew-header" style="border-top:3px solid var(--school)">' +
        '<div class="crew-name-row">' +
          '<span class="crew-drag-handle">⠿</span>' +
          '<div class="crew-name' + (session.name?'':' crew-name-empty') + '" onclick="startRename(\'' + session.id + '\')" id="cname-' + session.id + '">' + (session.name||'Click to name…') + '</div>' +
          '<button class="crew-menu-btn" onclick="openCtx(event,\'' + session.id + '\')">⋯</button>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:4px;margin-top:2px">' +
          '<textarea class="crew-note" rows="1" placeholder="Notes…" style="flex:1;min-width:0" onchange="saveCrewNote(\'' + session.id + '\',this.value)" oninput="autoResizeNote(this)">' + (session.note||'') + '</textarea>' +
          '<span class="crew-count-badge" style="color:var(--school)">' + members.length + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="crew-body" id="crew-body-' + session.id + '"></div>';
    board.appendChild(col);

function saveNewTab() {

  if (!name) return;
  const icon   = document.getElementById('tabIcon').value.trim() || '⚡';
  const layout = document.getElementById('tabLayout').value;

  // Generate a safe tab id from the name
  const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'') + '_' + Date.now();

  // Register in TAB_CONFIG
  TAB_CONFIG[id] = {
    label: name,
    layout,
    roles: ['Foreman','Journeyman','Apprentice','Equipment Operator','Groundman'],
    legend: [{r:'Foreman',c:'#C8102E'},{r:'Journeyman',c:'#2a7aff'},{r:'Apprentice',c:'#2d9e4f'},{r:'Groundman',c:'#555'}],
  };

  // Add tab button to tab bar (before the + Tab button)
  const tabBar = document.querySelector('.tab-bar');
  const addBtn = tabBar.querySelector('.tab-add-btn');
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.tab = id;
  btn.onclick = () => switchTab(id);
  btn.innerHTML = icon + ' ' + name + ' <span class="tab-count" id="tc-' + id + '">0</span>';
  tabBar.insertBefore(btn, addBtn);

  // Add delete option on right-click / double-click
  btn.addEventListener('dblclick', e => {
    e.stopPropagation();
    if (!confirm('Remove tab "' + name + '"? All workers will be unassigned.')) return;
    state.workers.forEach(w => { if (w.tab === id) { w.tab = 'ab'; w.crewId = null; } });
    state.crews = state.crews.filter(c => c.tab !== id);
    delete TAB_CONFIG[id];
    btn.remove();
    switchTab('ab');
  });

  closeAddTabModal();

  // Switch to new tab
  switchTab(id);
}

function syncStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || 'var(--dim)';
}

async function saveBoard() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  syncStatus('Saving…', 'var(--orange)');
  const snapshot = {
    version: 2,
    savedAt: new Date().toISOString(),
    activeTab: activeTab,
    crews: state.crews,
    workers: state.workers,
    students: state.students || [],
  };
  try {
    const resp = await fetch(`${JB_BASE}/${JB_BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JB_API_KEY
      },
      body: JSON.stringify(snapshot)
    });
    if (resp.ok) {
      syncStatus('\u2713 Saved', '#22c55e');
      setTimeout(() => syncStatus(''), 4000);
    } else {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.message || resp.statusText);
    }
  } catch(e) {
    syncStatus('\u2717 Failed', '#ef4444');
    // Fall back to local download so work is never lost
    const blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
    a.href = URL.createObjectURL(blob);
    a.download = 'valard-resource-board_' + ts + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    alert('Cloud save failed: ' + e.message + '\n\nBoard downloaded locally as backup.');
  }
  btn.disabled = false; btn.textContent = '\ud83d\udcbe Save';
}

async function loadBoard() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = '⏳ Loading…';
  syncStatus('Loading…', 'var(--orange)');
  try {
    const resp = await fetch(`${JB_BASE}/${JB_BIN_ID}/latest`, {
      headers: {'X-Master-Key': JB_API_KEY}
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.message || resp.statusText);
    }
    const data = await resp.json();
    const snap = data.record;
    if (!snap.workers || !snap.crews) { alert('Invalid board data in cloud.'); btn.disabled = false; btn.textContent = '\ud83d\udcc2 Load'; return; }
    const savedAt = snap.savedAt ? snap.savedAt.replace('T',' ').slice(0,19) + ' UTC' : 'unknown';
    if (!confirm(`Load board from cloud?\n\nLast saved: ${savedAt}\nWorkers: ${snap.workers.length} | Crews: ${snap.crews.length}\n\nThis replaces your current view.`)) {
      btn.disabled = false; btn.textContent = '\ud83d\udcc2 Load'; syncStatus(''); return;
    }
    state.workers  = snap.workers;
    state.crews    = snap.crews;
    state.students = snap.students || [];
    switchTab(snap.activeTab || 'ab');
    updateStats();
    syncStatus('\u2713 Loaded', '#22c55e');
    setTimeout(() => syncStatus(''), 4000);
  } catch(e) {
    syncStatus('\u2717 Failed', '#ef4444');
    alert('Load failed: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '\ud83d\udcc2 Load';
}

// ─── EXPORT CSV ────────────────────────────────────────────────────────────
function exportCSV() {
  const tab = activeTab;
  const cfg = TAB_CONFIG[tab];
  const isSchool = tab === 'school';

  let rows, headers, filename;

  if (isSchool) {
    headers = ['Name','Level','Institution','Start Date','End Date','Session'];
    rows = (state.students || []).map(s => {
      const session = state.crews.find(c => c.id === s.sessionId);
      return [s.name, s.level, s.institution||'', s.startDate||'', s.endDate||'', session ? session.name : 'Unassigned'];
    });
    filename = 'valard-school';
  } else {
    headers = ['Name','Role','Job Title','Cert/Ticket','License','Supervisor/Crew','Sub-Crew','Division'];
    const workers = state.workers.filter(w => w.tab === tab);
    rows = workers.map(w => {
      const crew = state.crews.find(c => c.id === w.crewId);
      let supervisor = '', subCrew = '';
      if (crew) {
        if (crew.type === 'sub') {
          const sup = state.crews.find(c => c.id === crew.supId);
          supervisor = sup ? sup.name : crew.name;
          subCrew = crew.name || '(unnamed sub-crew)';
        } else {
          supervisor = crew.name;
        }
      }
      return [
        w.name, w.role, w.jobTitle||'', w.cert||'', w.license||'',
        supervisor || 'Unassigned', subCrew, cfg ? cfg.label : tab
      ];
    });
    // Sort: supervisor name, then role rank
    rows.sort((a,b) => {
      const sc = a[5].localeCompare(b[5]);
      if (sc) return sc;
      return a[1].localeCompare(b[1]);
    });
    filename = 'valard-' + tab;
  }

  const csvContent = [headers, ...rows]
    .map(row => row.map(cell => '"' + String(cell).replace(/"/g,'""') + '"').join(','))
    .join('\r\n');

  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = URL.createObjectURL(blob);
  a.download = filename + '_' + ts + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

  const PIN  = '3523';
  const SESSION_KEY = 'vrd_auth';
  let entered = '';

  function unlock() {
    sessionStorage.setItem(SESSION_KEY, '1');
    const gate = document.getElementById('pinGate');
    gate.style.transition = 'opacity .4s';
    gate.style.opacity = '0';
    setTimeout(() => gate.style.display = 'none', 400);
  }

  // Already unlocked this session
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('pinGate').style.display = 'none';
  }

  window.pinPress = function(d) {
    if (entered.length >= 4) return;
    entered += d;
    document.getElementById('pd' + (entered.length - 1)).classList.add('filled');
    document.getElementById('pinError').textContent = '';
    if (entered.length === 4) setTimeout(pinEnter, 120);
  };

  window.pinClear = function() {
    if (!entered.length) return;
    document.getElementById('pd' + (entered.length - 1)).classList.remove('filled');
    entered = entered.slice(0, -1);
  };

  window.pinEnter = function() {
    if (entered === PIN) {
      unlock();
    } else {
      document.getElementById('pinError').textContent = 'Incorrect PIN';
      document.querySelectorAll('.pin-dot').forEach(d => {
        d.classList.remove('filled');
        d.classList.add('shake');
        setTimeout(() => d.classList.remove('shake'), 400);
      });
      entered = '';
    }
  };

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('pinGate').style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9') pinPress(e.key);
    if (e.key === 'Backspace') pinClear();
    if (e.key === 'Enter') pinEnter();
  });
})();
